<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #1a1a2e; }
      .wave { stroke: #4fc3f7; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #0d0d1a; }
      .wave { stroke: #81d4fa; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <polyline class="wave" points="10,90 30,90 40,50 55,130 70,60 85,110 100,70 115,120 130,40 145,130 155,90 170,90"
    stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
